<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星驰AI 管理后台</title>
    <style>
      :root {
        color: #1b2329;
        background: #f6f8fa;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
      }

      main {
        width: min(1180px, calc(100% - 40px));
        margin: 0 auto;
        padding: 42px 0 64px;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 28px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 34px;
        line-height: 1.15;
        letter-spacing: -0.03em;
      }

      .muted {
        color: #65737e;
        line-height: 1.7;
      }

      .panel {
        border: 1px solid #e1e7ed;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 24px 70px rgba(20, 30, 40, 0.06);
        padding: 26px;
      }

      .login {
        width: min(460px, 100%);
        margin: 92px auto;
        display: grid;
        gap: 16px;
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
        font-weight: 800;
      }

      input {
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #f2f5f8;
        color: #1b2329;
        padding: 14px 15px;
        outline: none;
        box-shadow: inset 0 0 0 1px rgba(120, 138, 152, 0.18);
      }

      input:focus {
        box-shadow: inset 0 0 0 2px rgba(0, 104, 119, 0.28);
      }

      button {
        border: 0;
        border-radius: 8px;
        padding: 13px 18px;
        color: #fff;
        background: linear-gradient(135deg, #006877, #22d3ee);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      button.secondary {
        color: #006877;
        background: #eaf7f9;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }

      .hidden {
        display: none !important;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 18px;
      }

      .metric strong {
        display: block;
        margin-top: 10px;
        font-size: 34px;
        letter-spacing: -0.04em;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.35fr);
        gap: 18px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-top: 18px;
      }

      .form-grid .full {
        grid-column: 1 / -1;
      }

      .code-output {
        display: grid;
        gap: 8px;
        margin-top: 18px;
      }

      .code-pill {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-radius: 8px;
        background: #f2f5f8;
        padding: 12px 14px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-weight: 800;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 18px;
        font-size: 14px;
      }

      th,
      td {
        border-bottom: 1px solid #e7edf2;
        padding: 12px 8px;
        text-align: left;
        vertical-align: top;
      }

      th {
        color: #65737e;
        font-size: 12px;
      }

      .status {
        display: inline-flex;
        border-radius: 8px;
        padding: 4px 8px;
        color: #006877;
        background: #eaf7f9;
        font-size: 12px;
        font-weight: 900;
      }

      .status.redeemed {
        color: #7a3b00;
        background: #fff1d6;
      }

      .status.expired {
        color: #9f1a1a;
        background: #fde8e8;
      }

      .message {
        min-height: 22px;
        color: #006877;
        font-weight: 800;
      }

      @media (max-width: 900px) {
        header,
        .layout {
          grid-template-columns: 1fr;
          display: grid;
        }

        .grid,
        .form-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section id="login" class="panel login">
        <div>
          <h1>星驰AI 管理后台</h1>
          <p class="muted">用于生成兑换码和查看每日独立访客。</p>
        </div>
        <label>
          管理员账号
          <input id="username" autocomplete="username" value="admin" />
        </label>
        <label>
          密码
          <input id="password" type="password" autocomplete="current-password" />
        </label>
        <button id="loginBtn">登录</button>
        <p id="loginMessage" class="message"></p>
      </section>

      <section id="dashboard" class="hidden">
        <header>
          <div>
            <h1>兑换码与访客统计</h1>
            <p class="muted">后台地址不在前台展示。兑换码默认单次使用，过期后自动失效。</p>
          </div>
          <button class="secondary" id="refreshBtn">刷新数据</button>
        </header>

        <div class="grid">
          <article class="panel metric">
            <p class="muted">今日独立访客</p>
            <strong id="todayVisitors">0</strong>
          </article>
          <article class="panel metric">
            <p class="muted">全部兑换码</p>
            <strong id="totalCodes">0</strong>
          </article>
          <article class="panel metric">
            <p class="muted">未使用兑换码</p>
            <strong id="activeCodes">0</strong>
          </article>
          <article class="panel metric">
            <p class="muted">已兑换</p>
            <strong id="redeemedCodes">0</strong>
          </article>
        </div>

        <div class="layout">
          <section class="panel">
            <h2>生成兑换码</h2>
            <p class="muted">按有效期批量生成，复制后发给用户。</p>
            <div class="form-grid">
              <label>
                有效期天数
                <input id="days" type="number" min="1" max="365" value="30" />
              </label>
              <label>
                生成数量
                <input id="count" type="number" min="1" max="100" value="1" />
              </label>
              <label class="full">
                备注
                <input id="label" placeholder="例如：某客户、某渠道、某次活动" />
              </label>
            </div>
            <button id="createBtn" style="margin-top: 16px;">生成兑换码</button>
            <p id="createMessage" class="message" style="margin-top: 12px;"></p>
            <div id="codeOutput" class="code-output"></div>
          </section>

          <section class="panel">
            <h2>最近 14 天独立访客</h2>
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>独立访客</th>
                </tr>
              </thead>
              <tbody id="daysTable"></tbody>
            </table>
          </section>
        </div>

        <section class="panel" style="margin-top: 18px;">
          <h2>兑换码列表</h2>
          <table>
            <thead>
              <tr>
                <th>兑换码</th>
                <th>状态</th>
                <th>有效期至</th>
                <th>兑换时间</th>
                <th>备注</th>
              </tr>
            </thead>
            <tbody id="codesTable"></tbody>
          </table>
        </section>
      </section>
    </main>

    <script>
      const tokenKey = "xingchi-admin-token";
      const login = document.getElementById("login");
      const dashboard = document.getElementById("dashboard");
      const loginMessage = document.getElementById("loginMessage");
      const createMessage = document.getElementById("createMessage");
      const codeOutput = document.getElementById("codeOutput");

      function getToken() {
        return localStorage.getItem(tokenKey) || "";
      }

      function setToken(token) {
        localStorage.setItem(tokenKey, token);
      }

      function formatTime(value) {
        if (!value) return "-";
        return new Date(value).toLocaleString("zh-CN", { hour12: false });
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: getToken() ? `Bearer ${getToken()}` : "",
            ...(options.headers || {}),
          },
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      async function doLogin() {
        loginMessage.textContent = "";
        try {
          const data = await api("/admin-api/login", {
            method: "POST",
            body: JSON.stringify({
              username: document.getElementById("username").value,
              password: document.getElementById("password").value,
            }),
          });
          setToken(data.token);
          showDashboard();
          await loadSummary();
        } catch (error) {
          loginMessage.textContent = error.message;
        }
      }

      function showDashboard() {
        login.classList.add("hidden");
        dashboard.classList.remove("hidden");
      }

      async function loadSummary() {
        const data = await api("/admin-api/summary");
        document.getElementById("todayVisitors").textContent = data.todayVisitors;
        document.getElementById("totalCodes").textContent = data.totalCodes;
        document.getElementById("activeCodes").textContent = data.activeCodes;
        document.getElementById("redeemedCodes").textContent = data.redeemedCodes;
        document.getElementById("daysTable").innerHTML = data.days
          .map((item) => `<tr><td>${item.day}</td><td>${item.visitors}</td></tr>`)
          .join("");
        document.getElementById("codesTable").innerHTML = data.codes
          .map((item) => `
            <tr>
              <td><code>${item.code}</code></td>
              <td><span class="status ${item.status}">${statusText(item.status)}</span></td>
              <td>${formatTime(item.expiresAt)}</td>
              <td>${formatTime(item.redeemedAt)}</td>
              <td>${item.label || "-"}</td>
            </tr>
          `)
          .join("");
      }

      function statusText(status) {
        if (status === "redeemed") return "已兑换";
        if (status === "expired") return "已过期";
        return "未使用";
      }

      async function createCodes() {
        createMessage.textContent = "";
        codeOutput.innerHTML = "";
        try {
          const data = await api("/admin-api/codes", {
            method: "POST",
            body: JSON.stringify({
              days: document.getElementById("days").value,
              count: document.getElementById("count").value,
              label: document.getElementById("label").value,
            }),
          });
          createMessage.textContent = "已生成，可复制给用户。";
          codeOutput.innerHTML = data.codes
            .map((item) => `<div class="code-pill"><span>${item.code}</span><button class="secondary" data-code="${item.code}">复制</button></div>`)
            .join("");
          codeOutput.querySelectorAll("button").forEach((button) => {
            button.addEventListener("click", async () => {
              await navigator.clipboard.writeText(button.dataset.code);
              button.textContent = "已复制";
            });
          });
          await loadSummary();
        } catch (error) {
          createMessage.textContent = error.message;
        }
      }

      document.getElementById("loginBtn").addEventListener("click", doLogin);
      document.getElementById("refreshBtn").addEventListener("click", loadSummary);
      document.getElementById("createBtn").addEventListener("click", createCodes);
      document.getElementById("password").addEventListener("keydown", (event) => {
        if (event.key === "Enter") doLogin();
      });

      if (getToken()) {
        showDashboard();
        loadSummary().catch(() => {
          localStorage.removeItem(tokenKey);
          dashboard.classList.add("hidden");
          login.classList.remove("hidden");
        });
      }
    </script>
  </body>
</html>
